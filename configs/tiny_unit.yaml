model:
  vocab_size: 260
  max_seq_len: 64
  d_model: 128
  n_heads: 4
  n_kv_heads: 4
  hot_layers: 2
  cold_layers: 2
  cold_block_size: 1
  ffn_multiplier: 2.0
  dropout: 0.0
  tie_embeddings: true
  use_gradient_checkpointing: false
  attention_backend: triton_int4
dopa:
  difficulty_threshold: 0.30
  top_k_cold_blocks: 1
  skeleton_dim: 128
  skeleton_vocab_size: 1024
  skeleton_layers: 1
  lora_modules: 8
  lora_rank: 4
  lora_target_sites: 12
  top_k_lora: 2
  lora_alpha: 8.0
  hot_kv_window: 32
  hot_kv_int4: true
  hot_kv_summary: true
  hot_kv_summary_decay: 0.99
  cold_kv_window: 16
  cold_kv_hot_units: 2
  cold_coverage_penalty: 0.01
  tool_calling_enabled: true
  tool_action_count: 16
  tool_query_dim: 128
  tool_need_loss_weight: 0.05
  tool_argument_loss_weight: 0.03
  tool_query_loss_weight: 0.02
offload:
  enabled: false
  device: cpu
  cold_device: cpu
  max_gpu_cold_blocks: 1
  lazy_cold_blocks: true
  quantized_cold: false
  cold_dtype: fp32
  cold_granularity: unit
  cold_unit_budget_mb: 32.0
  cold_layer_budget_per_step: 2
  cold_attention_heads_per_step: 2
  cold_ffn_blocks_per_step: 2
  cold_ffn_subblocks: 4
  cold_train_density: 0.002
  hot_train_density: 0.05
train:
  seed: 42
  batch_size: 2
  grad_accum_steps: 1
  learning_rate: 0.0003
  weight_decay: 0.1
  max_steps: 10
  warmup_steps: 2
  grad_clip: 1.0
  precision: bf16
  train_stage: stage1
  checkpoint_every: 10
  log_every: 5
data:
  train_path: data/toy.jsonl
  num_workers: 0
