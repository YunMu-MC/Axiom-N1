model:
  vocab_size: 260
  max_seq_len: 256
  d_model: 1024
  n_heads: 16
  n_kv_heads: 4
  hot_layers: 6
  cold_layers: 18
  cold_block_size: 3
  ffn_multiplier: 3.0
  dropout: 0.0
  tie_embeddings: true
  use_gradient_checkpointing: true
  attention_backend: triton_int4
dopa:
  difficulty_threshold: 0.30
  top_k_cold_blocks: 1
  cold_resid_scale: 1.0
  skeleton_dim: 384
  skeleton_vocab_size: 4096
  skeleton_layers: 2
  lora_modules: 32
  lora_rank: 8
  lora_target_sites: 36
  top_k_lora: 3
  lora_alpha: 16.0
  fast_weight_rank: 1
  curiosity_threshold: 0.20
  hot_kv_window: 512
  hot_kv_int4: true
  hot_kv_summary: true
  hot_kv_summary_decay: 0.99
  cold_kv_window: 256
  cold_kv_hot_units: 8
  cold_coverage_penalty: 0.01
offload:
  enabled: true
  device: cuda
  cold_device: cpu
  prefetch: false
  pin_memory: false
  max_gpu_cold_blocks: 1
  cold_checkpoint_dir: checkpoints/cold_shell_local
  lazy_cold_blocks: true
  quantized_cold: true
  cold_dtype: fp16
  cold_granularity: unit
  cold_unit_budget_mb: 250.0
  cold_layer_budget_per_step: 2
  cold_attention_heads_per_step: 12
  cold_ffn_blocks_per_step: 6
  cold_ffn_subblocks: 32
  cold_train_density: 0.002
  hot_train_density: 0.05
  ram_budget_gb: 16.0
  vram_budget_gb: 8.0
train:
  seed: 42
  batch_size: 1
  grad_accum_steps: 1
  learning_rate: 0.0002
  weight_decay: 0.1
  max_steps: 2
  warmup_steps: 1
  grad_clip: 1.0
  precision: bf16
  shadow_density: 0.02
  shadow_layers_fraction: 0.25
  train_stage: stage1
  checkpoint_every: 2
  log_every: 1
data:
  train_path: D:/AI/dopa_coder_n1/data/gate_supervision_batch_001
  valid_path: null
  tokenizer_path: null
  skeleton_path: null
  num_workers: 0
